services:
  nginx:
    image: nginx:alpine
    container_name: poc_php_nginx
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    command: >
      sh -c "rm -f /var/log/nginx/access.log /var/log/nginx/error.log &&
             touch /var/log/nginx/access.log /var/log/nginx/error.log &&
             nginx -g 'daemon off;'"
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poc_php_web
    expose:
      - "80"
    environment:
      DB_HOST: db
      DB_NAME: appdb
      DB_USER: root
      DB_PASSWORD: rootpass
      SALT: 'ajgtpbj45pbdu155c5df5'
    depends_on:
      - db
    volumes:
      - ./app:/var/www/html
      - nginx_logs:/var/log/nginx
    privileged: true
    command: >
      sh -c "mkdir -p /var/www/html/avatar &&
             chmod -R 777 /var/www/html/avatar &&
             php -S 0.0.0.0:80 -t /var/www/html"

  db:
    image: mysql:8.0
    container_name: poc_php_db
    restart: unless-stopped
    command: --secure-file-priv=""
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d

volumes:
  mysql_data:
  nginx_logs:
